<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact — Adjey Hirwa</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
<script src="script.js"></script>
<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --ink:#1a1714;
  --parchment:#f4f0e8;
  --gold:#b8892a;
  --muted:#8e877b;
}

body{
  background:var(--ink);
  color:var(--parchment);
  font-family:'Cormorant Garamond', serif;
  overflow-x:hidden;
}

.contact-page{
  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:100px 10vw;

  position:relative;
}

.contact-page::before{
  content:'';

  position:absolute;
  inset:0;

  background:
  radial-gradient(circle at top left,
  rgba(184,137,42,0.08),
  transparent 40%);

  pointer-events:none;
}

.contact-box{
  width:100%;
  max-width:760px;

  position:relative;
  z-index:2;
}

.contact-label{
  font-family:'Space Mono', monospace;
  font-size:10px;
  letter-spacing:0.2em;
  text-transform:uppercase;

  color:var(--gold);

  margin-bottom:24px;
}

.contact-title{
  font-size:clamp(60px,10vw,140px);
  line-height:0.88;
  font-weight:300;

  margin-bottom:34px;
}

.contact-title em{
  display:block;
  color:var(--gold);
  font-style:italic;
}

.contact-text{
  max-width:600px;

  font-size:22px;
  line-height:1.8;

  color:#c9c1b5;

  margin-bottom:60px;
}

.contact-links{
  display:flex;
  flex-direction:column;
  gap:24px;
}

.contact-links a{
  color:var(--parchment);

  text-decoration:none;

  font-size:28px;
  font-weight:300;

  transition:0.3s ease;
}

.contact-links a:hover{
  color:var(--gold);
  transform:translateX(10px);
}

.back-btn{
  display:inline-block;

  margin-top:70px;

  padding:14px 26px;

  border:1px solid rgba(184,137,42,0.6);

  color:var(--gold);

  text-decoration:none;

  font-family:'Space Mono', monospace;
  font-size:10px;
  letter-spacing:0.16em;
  text-transform:uppercase;

  transition:0.3s ease;
}

.back-btn:hover{
  background:var(--gold);
  color:var(--ink);
}

@media(max-width:700px){

  .contact-page{
    padding:80px 8vw;
  }

  .contact-text{
    font-size:18px;
  }

  .contact-links a{
    font-size:22px;
  }

}
.contact-image-side{
  position:absolute;
  right:5vw;
  top:50%;
  transform:translateY(-50%);
  z-index:1;
}

.contact-image-side img{
  width:320px;
  max-width:30vw;
  border-radius:18px;
  object-fit:cover;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  opacity:0.9;
  transition:0.4s ease;
}

.contact-image-side img:hover{
  transform:scale(1.05);
  opacity:1;
}
@media(max-width:900px){
  .contact-image-side{
    position:relative;
    right:auto;
    top:auto;
    transform:none;
    margin-top:50px;
    display:flex;
    justify-content:center;
  }

  .contact-image-side img{
    width:80%;
    max-width:350px;
  }
}

</style>
</head>

<body>

<section class="contact-page">

  <div class="contact-box">

    <p class="contact-label">
      Get In Touch
    </p>

    <h1 class="contact-title">
      Adjey <em>Hirwa</em>
    </h1>

    <p class="contact-text">
      Available for commissions, exhibitions,
      collaborations, photography,
      and creative projects.
    </p>

   <div class="contact-links">

    <a href="mailto:hirwamichel9@gmail.com" class="contact-btn">
      Email: hirwamichel9@gmail.com 
    </a>

    <a href="https://wa.me/250794025673" target="_blank" class="contact-btn">
    WhatsApp: Adjey
    </a>

    <a href="https://www.instagram.com/midnight_a_djey" target="_blank" class="contact-btn">
    Instagram: midnight_a_djey
    </a>

  </div>

    <a href="index.html" class="back-btn">
      Back To Portfolio
    </a>

  </div>

</section>
<div class="contact-image-side">
  <img src="images/contact.jpg" alt="Contact Image">
</div>
</body>
</html>
